<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 11</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
<h1>Loop Activity</h1>
 
<div class="container">
 
    <!-- FOR LOOP -->
    <div class="box">
        <h3>For Loop</h3>
        Enter number: <input type="number" id="forNum"><br>
        Enter text: <input type="text" id="forText"><br><br>
        <button onclick="showFor()">Show</button>
        <button onclick="clearFor()">Clear</button>
        <p id="forOutput"></p>
    </div>
 
    <!-- WHILE LOOP -->
    <div class="box">
        <h3>While Loop</h3>
        Enter number: <input type="number" id="whileNum"><br>
        Enter text: <input type="text" id="whileText"><br><br>
        <button onclick="showWhile()">Show</button>
        <button onclick="clearWhile()">Clear</button>
        <p id="whileOutput"></p>
    </div>
 
    <!-- DO-WHILE LOOP -->
    <div class="box">
        <h3>Do-While Loop</h3>
        Enter number: <input type="number" id="doNum"><br>
        Enter text: <input type="text" id="doText"><br><br>
        <button onclick="showDo()">Show</button>
        <button onclick="clearDo()">Clear</button>
        <p id="doOutput"></p>
    </div>
 
</div>
 
<script src="script.js"></script>
</body>
</html>
