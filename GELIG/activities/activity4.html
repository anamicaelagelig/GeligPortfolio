<!DOCTYPE html>
<html>
    <head>
        <title>Activity 4</title>
    </head>
    <body>
        <h2>User Information Form</h2>
        <form action="" method="post">
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="firstname" required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="fname" name="firstname" required><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age" required><br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="male"><br><br>
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female"><br><br>
            <label for="fname">First Name:</label><br>
            <input type="radio" id="other" name="gender" value="other"><br><br>
            <label for="other">Other</label><br><br>

            <label>Hobbies:</label><br>
            <input type="checkbox" id="hobby1" name="hobby" value="reading"><br><br>
            <label for="reading">Reading</label><br>
            <input type="checkbox" id="hobby2" name="hobby" value="traveling"><br><br>
            <label for="traveling">Traveling</label><br>
            <input type="checkbox" id="hobby3" name="hobby" value="cooking"><br><br>
            <label for="cooking">Cooking</label><br>
            <input type="checkbox" id="hobby4" name="hobby" value="gaming"><br><br>
            <label for="gaming">Gaming</label><br>
            <input type="checkbox" id="hobby5" name="hobby" value="sports"><br><br>
            <label for="sports">Sports</label><br><br>

            <label for="year-level">Year Level:</label><br>
            <select id="year-level" name="year-level">
                <option value="1st-year">1st Year</option>
                <option value="2nd-year">2nd Year</option>
                <option value="3rd-year">3rd Year</option>
                <option value="4th-year">4th Year</option>
            </select><br><br>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
    </body>
</html>
